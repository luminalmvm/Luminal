name: lumit_flutter
description: "Lumit's Flutter frontend alternative (K-174) — the chrome over the Rust engine; see docs/flutter-port/."
publish_to: 'none'
version: 0.1.0+1

environment: 
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  iconoir_flutter: ^7.11.1
  file_selector: ^1.1.0
  # Multi-window (pop-out panels): each secondary window is its own Flutter
  # engine in the SAME OS process, so it shares this process's lumit_bridge.dll
  # and therefore the same engine document (see lib/popout/). Apache-2.0, no
  # third-party deps, SDK >=3.5.0 — compatible with this package's ^3.12.2.
  desktop_multi_window: ^0.3.0
  lumit_bridge:
    path: rust_builder
  flutter_rust_bridge: 2.12.0
  provider: ^6.1.5+1
  freezed_annotation: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  build_runner: ^2.15.1
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Medium.otf
          weight: 500

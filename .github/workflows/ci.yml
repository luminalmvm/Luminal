# CI: every push re-proves every promise (docs/14-ENGINEERING-RULES.md §tests).
name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install FFmpeg (keg-only, matches .cargo/config.toml)
        run: brew install ffmpeg@7
      - name: FFmpeg version for the cache key (Cellar paths are versioned;
              a cached rusty_ffmpeg build script must not outlive its keg)
        id: ffver
        run: echo "v=$(brew list --versions ffmpeg@7 | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ffmpeg-${{ steps.ffver.outputs.v }}
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  windows:
    name: tests (Windows — the shipping target)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # TODO(media-on-windows): kiriko-media needs FFmpeg dev libs here (BtbN
      # shared build + FFMPEG_LIBS_DIR/FFMPEG_INCLUDE_DIR). Until the desktop
      # dev setup lands, Windows builds without the media feature — tracked in
      # docs/impl/phase-0-kickoff.md slice 4 notes.
      - run: cargo test -p kiriko-core -p kiriko-project
      # check (not test): kiriko-ui's dev-deps include the media fixtures,
      # and dev-deps ignore feature flags; ui tests run on the macOS job.
      - run: cargo check -p kiriko-ui --no-default-features
      - run: cargo check -p kiriko-app --no-default-features

  coverage:
    name: engine-crate coverage gate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install FFmpeg (keg-only, matches .cargo/config.toml)
        run: brew install ffmpeg@7
      - name: FFmpeg version for the cache key
        id: ffver
        run: echo "v=$(brew list --versions ffmpeg@7 | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ffmpeg-${{ steps.ffver.outputs.v }}
      # Engine crates must hold the line; the threshold may rise, never fall.
      # UI crates join the gate once egui_kittest harness tests land.
      - run: >
          cargo llvm-cov -p kiriko-core -p kiriko-project
          --fail-under-lines 75

  no-hex-outside-theme:
    name: design-token lint (no hex literals outside the theme module)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          hits=$(grep -rnE 'Color32::from_rgb|#[0-9a-fA-F]{6}' crates --include='*.rs' \
            | grep -v 'crates/kiriko-ui/src/theme.rs' || true)
          if [ -n "$hits" ]; then
            echo "Colour values outside kiriko_ui::theme (docs/15-DESIGN.md):"
            echo "$hits"
            exit 1
          fi
